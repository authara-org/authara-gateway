name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Caddyfile formatting
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace caddy:2 \
            caddy fmt --diff Caddyfile

      - name: Build Docker image
        run: |
          docker build -t authara-gateway:ci .

      - name: Validate Caddyfile
        run: |
          docker run --rm authara-gateway:ci caddy validate --config /etc/caddy/Caddyfile
